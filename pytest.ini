[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: pure unit tests, no I/O
    integration: tests that touch the filesystem or mock external services
    slow: tests that take more than 1 second
    xfail_until_fixed: known bug — test documents it and should pass after fix